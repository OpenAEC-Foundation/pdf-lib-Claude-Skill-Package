<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d23"/>
      <stop offset="100%" stop-color="#2d3139"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#282c34"/>
      <stop offset="100%" stop-color="#21252b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#grid)"/>
  </g>

  <!-- Left side content -->
  <!-- Big number -->
  <text x="75" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="160" font-weight="900" fill="white" letter-spacing="-5">17</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#e5a835" letter-spacing="8" text-transform="uppercase">DETERMINISTIC SKILLS</text>

  <!-- Description -->
  <text x="80" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#8b919a">for flawless PDF document generation with pdf-lib</text>

  <!-- Technology badges -->
  <g transform="translate(80, 400)">
    <!-- pdf-lib badge -->
    <rect x="0" y="0" width="100" height="38" rx="19" fill="none" stroke="#e5a835" stroke-width="1.5"/>
    <text x="50" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e5a835" text-anchor="middle">pdf-lib</text>

    <!-- TypeScript badge -->
    <rect x="120" y="0" width="120" height="38" rx="19" fill="none" stroke="#e5a835" stroke-width="1.5"/>
    <text x="180" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e5a835" text-anchor="middle">TypeScript</text>

    <!-- JavaScript badge -->
    <rect x="260" y="0" width="115" height="38" rx="19" fill="none" stroke="#e5a835" stroke-width="1.5"/>
    <text x="317" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e5a835" text-anchor="middle">JavaScript</text>
  </g>

  <!-- Version info -->
  <text x="80" y="500" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#5a6068">
    <tspan>pdf-lib 1.x</tspan>
    <tspan dx="20" fill="#3d4249">|</tspan>
    <tspan dx="20">Node.js + Browser</tspan>
    <tspan dx="20" fill="#3d4249">|</tspan>
    <tspan dx="20">Claude Skills</tspan>
  </text>

  <!-- Right side: Code editor window -->
  <g transform="translate(560, 60)">
    <!-- Editor window -->
    <rect x="0" y="0" width="660" height="480" rx="10" fill="url(#codeGrad)" stroke="#3d4249" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="660" height="36" rx="10" fill="#2d3139"/>
    <rect x="0" y="20" width="660" height="16" fill="#2d3139"/>

    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>

    <!-- File name -->
    <text x="330" y="23" font-family="'Consolas', 'Courier New', monospace" font-size="13" fill="#8b919a" text-anchor="middle">generate-invoice.ts</text>

    <!-- Code content -->
    <g transform="translate(24, 56)" font-family="'Consolas', 'Courier New', monospace" font-size="13.5" line-spacing="1.5">
      <!-- Line 1: comment -->
      <text y="0" fill="#5c6370">// pdf-lib Invoice — Correct Pattern</text>

      <!-- Line 2: import -->
      <text y="24">
        <tspan fill="#c678dd">import</tspan>
        <tspan fill="#abb2bf"> { </tspan>
        <tspan fill="#e5c07b">PDFDocument</tspan>
        <tspan fill="#abb2bf">, </tspan>
        <tspan fill="#e5c07b">rgb</tspan>
        <tspan fill="#abb2bf">, </tspan>
        <tspan fill="#e5c07b">StandardFonts</tspan>
        <tspan fill="#abb2bf"> }</tspan>
      </text>
      <text y="48">
        <tspan fill="#c678dd">  from</tspan>
        <tspan fill="#98c379"> 'pdf-lib'</tspan>
        <tspan fill="#abb2bf">;</tspan>
      </text>

      <!-- Line 3: blank -->

      <!-- Line 4: function -->
      <text y="84">
        <tspan fill="#c678dd">const</tspan>
        <tspan fill="#61afef"> pdfDoc</tspan>
        <tspan fill="#abb2bf"> = </tspan>
        <tspan fill="#c678dd">await</tspan>
        <tspan fill="#e5c07b"> PDFDocument</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#61afef">create</tspan>
        <tspan fill="#abb2bf">();</tspan>
      </text>

      <!-- Line 5 -->
      <text y="108">
        <tspan fill="#c678dd">const</tspan>
        <tspan fill="#61afef"> font</tspan>
        <tspan fill="#abb2bf"> = </tspan>
        <tspan fill="#c678dd">await</tspan>
        <tspan fill="#61afef"> pdfDoc</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#61afef">embedFont</tspan>
        <tspan fill="#abb2bf">(</tspan>
      </text>
      <text y="132">
        <tspan fill="#abb2bf">  </tspan>
        <tspan fill="#e5c07b">StandardFonts</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#e5c07b">Helvetica</tspan>
        <tspan fill="#abb2bf">);</tspan>
      </text>

      <!-- Line 6 -->
      <text y="168">
        <tspan fill="#c678dd">const</tspan>
        <tspan fill="#61afef"> page</tspan>
        <tspan fill="#abb2bf"> = </tspan>
        <tspan fill="#61afef">pdfDoc</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#61afef">addPage</tspan>
        <tspan fill="#abb2bf">();</tspan>
      </text>

      <!-- Line 7 -->
      <text y="192">
        <tspan fill="#c678dd">const</tspan>
        <tspan fill="#abb2bf"> { </tspan>
        <tspan fill="#e06c75">height</tspan>
        <tspan fill="#abb2bf"> } = </tspan>
        <tspan fill="#61afef">page</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#61afef">getSize</tspan>
        <tspan fill="#abb2bf">();</tspan>
      </text>

      <!-- Line 8: blank -->

      <!-- Line 9: comment -->
      <text y="228" fill="#5c6370">// Y origin is BOTTOM-LEFT, not top-left!</text>

      <!-- Line 10: drawText -->
      <text y="252">
        <tspan fill="#61afef">page</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#61afef">drawText</tspan>
        <tspan fill="#abb2bf">(</tspan>
        <tspan fill="#98c379">'INVOICE'</tspan>
        <tspan fill="#abb2bf">, {</tspan>
      </text>

      <text y="276">
        <tspan fill="#abb2bf">  </tspan>
        <tspan fill="#e06c75">x</tspan>
        <tspan fill="#abb2bf">: </tspan>
        <tspan fill="#d19a66">50</tspan>
        <tspan fill="#abb2bf">,</tspan>
      </text>

      <text y="300">
        <tspan fill="#abb2bf">  </tspan>
        <tspan fill="#e06c75">y</tspan>
        <tspan fill="#abb2bf">: </tspan>
        <tspan fill="#e06c75">height</tspan>
        <tspan fill="#abb2bf"> - </tspan>
        <tspan fill="#d19a66">50</tspan>
        <tspan fill="#abb2bf">,</tspan>
      </text>

      <text y="324">
        <tspan fill="#abb2bf">  </tspan>
        <tspan fill="#e06c75">size</tspan>
        <tspan fill="#abb2bf">: </tspan>
        <tspan fill="#d19a66">36</tspan>
        <tspan fill="#abb2bf">,</tspan>
        <tspan fill="#abb2bf"> </tspan>
        <tspan fill="#e06c75">font</tspan>
        <tspan fill="#abb2bf">,</tspan>
      </text>

      <text y="348">
        <tspan fill="#abb2bf">  </tspan>
        <tspan fill="#e06c75">color</tspan>
        <tspan fill="#abb2bf">: </tspan>
        <tspan fill="#61afef">rgb</tspan>
        <tspan fill="#abb2bf">(</tspan>
        <tspan fill="#d19a66">0</tspan>
        <tspan fill="#abb2bf">, </tspan>
        <tspan fill="#d19a66">0.53</tspan>
        <tspan fill="#abb2bf">, </tspan>
        <tspan fill="#d19a66">0.71</tspan>
        <tspan fill="#abb2bf">),</tspan>
      </text>

      <text y="372">
        <tspan fill="#abb2bf">});</tspan>
      </text>

      <text y="396">
        <tspan fill="#c678dd">const</tspan>
        <tspan fill="#61afef"> bytes</tspan>
        <tspan fill="#abb2bf"> = </tspan>
        <tspan fill="#c678dd">await</tspan>
        <tspan fill="#61afef"> pdfDoc</tspan>
        <tspan fill="#abb2bf">.</tspan>
        <tspan fill="#61afef">save</tspan>
        <tspan fill="#abb2bf">();</tspan>
        <tspan fill="#abb2bf" font-size="16">|</tspan>
      </text>
    </g>
  </g>

  <!-- OpenAEC Foundation logo -->
  <g transform="translate(1090, 580)">
    <text x="0" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#e5a835" text-anchor="start">
      <tspan fill="#ffffff">Open</tspan><tspan fill="#e5a835">AEC</tspan>
    </text>
    <text x="0" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b919a" text-anchor="start">Foundation</text>
  </g>
</svg>
